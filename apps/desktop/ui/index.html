<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeneGIS Workbench</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <strong>GeneGIS</strong>
        <span>AI-native GIS Workbench · Phase 8 gamma</span>
      </div>
    </header>

    <main class="layout">
      <section class="panel prompt-panel">
        <h2>Intent</h2>
        <label for="prompt">自然言語プロンプト</label>
        <textarea id="prompt" rows="3">名古屋市の人口密度を表示</textarea>
        <div class="actions">
          <button id="run-btn" type="button">Run Ask Pipeline</button>
          <button id="download-png-btn" type="button" class="secondary" disabled>
            Download PNG
          </button>
          <button id="gpu-preview-btn" type="button" class="secondary" disabled>
            Open GPU Map
          </button>
          <span id="status" class="status">Ready</span>
        </div>
      </section>

      <section class="panel map-panel">
        <h2>Map</h2>
        <iframe id="map-frame" title="Choropleth map"></iframe>
      </section>

      <aside class="sidebar">
        <section class="panel">
          <h2>Agent trace</h2>
          <div id="agent-meta" class="agent-meta">Loading…</div>
          <div class="agent-actions">
            <button id="agent-plan-btn" type="button" class="secondary">Plan only</button>
            <button id="agent-execute-btn" type="button" class="secondary">Approve &amp; execute</button>
            <button id="agent-retry-btn" type="button" class="secondary" hidden>Retry verify</button>
          </div>
          <div id="agent-steps" class="agent-list">Loading…</div>
          <div id="agent-history" class="agent-history">Loading history…</div>
        </section>
        <section class="panel">
          <h2>Provenance</h2>
          <div id="provenance" class="provenance-list">Loading…</div>
        </section>
        <section class="panel">
          <h2>Resolution</h2>
          <pre id="resolution" class="mono">—</pre>
        </section>
        <section class="panel">
          <h2>Comments</h2>
          <div id="collab-sync" class="collab-sync">Loading sync…</div>
          <form id="comment-form" class="comment-form">
            <label for="comment-author">Author</label>
            <input id="comment-author" type="text" value="reviewer" autocomplete="username" />
            <label for="comment-body">Comment</label>
            <textarea id="comment-body" rows="2" placeholder="Add a map review note…"></textarea>
            <div class="comment-actions">
              <button id="comment-add-btn" type="submit">Add comment</button>
              <button id="comment-sync-btn" type="button" class="secondary">Sync</button>
            </div>
          </form>
          <div id="comments" class="comment-list">Loading…</div>
        </section>
        <section class="panel">
          <h2>Plugins</h2>
          <div id="plugins" class="plugin-list">Loading…</div>
        </section>
        <section class="panel">
          <h2>STAC Catalog</h2>
          <pre id="stac-collection" class="mono">Loading…</pre>
          <div id="stac-items" class="stac-list">Loading items…</div>
        </section>
        <section class="panel">
          <h2>Dataset</h2>
          <pre id="dataset" class="mono">—</pre>
        </section>
        <section class="panel">
          <h2>Summary</h2>
          <pre id="summary" class="mono">—</pre>
        </section>
        <section class="panel">
          <h2>Verification</h2>
          <ul id="verification"></ul>
        </section>
        <section class="panel">
          <h2>Notes</h2>
          <ul id="notes"></ul>
        </section>
      </aside>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
